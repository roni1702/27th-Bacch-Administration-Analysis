<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOM 27th Bach Admission Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .splash-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #0f172a, #020617);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        #status-bar { transition: all 0.4s ease; height: 0; overflow: hidden; }
        #status-bar.show { height: 35px; }
    </style>
</head>
<body>

<!-- Status Bar -->
<div id="status-bar" class="fixed top-0 w-full z-[100] text-white text-[10px] font-bold flex items-center justify-center uppercase tracking-widest">
    <span id="status-text">ডেটা লোড হচ্ছে...</span>
</div>

<!-- Splash Screen -->
<div id="splash" class="splash-screen hidden">
    <h2 class="text-blue-400 text-sm tracking-[0.3em] mb-6">একটু জিকির করি</h2>
    <div id="dhikr-bangla" class="text-4xl font-bold mb-2"></div>
    <div id="dhikr-arabic" class="text-2xl text-green-400 mb-10 font-serif"></div>
    <div class="relative flex items-center justify-center w-24 h-24">
        <svg class="absolute inset-0 w-full h-full -rotate-90">
            <circle cx="48" cy="48" r="40" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-800"></circle>
            <circle id="timer-progress" cx="48" cy="48" r="40" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="251" stroke-dashoffset="0" class="text-blue-500 transition-all duration-[10000ms] linear"></circle>
        </svg>
        <span id="timer" class="text-3xl font-black">10</span>
    </div>
</div>

<div id="app" class="max-w-md mx-auto min-h-screen">
    
    <div id="step1" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[2.5rem] shadow-2xl w-full text-center animate__animated animate__zoomIn">
            <h1 class="text-2xl font-bold mb-8 text-slate-800">BIOM এর সাথে আপনার সম্পর্ক কি?</h1>
            <button onclick="selectRole('marketing')" class="w-full bg-blue-600 text-white py-5 rounded-2xl mb-4 text-lg font-bold shadow-xl active:scale-95 transition-all">১. মার্কেটিং মেম্বার</button>
            <button onclick="selectRole('teacher')" class="w-full bg-white border-2 border-slate-100 text-slate-700 py-5 rounded-2xl text-lg font-bold active:scale-95 transition-all">২. শিক্ষক / শিক্ষিকা</button>
        </div>
    </div>

    <div id="step2" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[2.5rem] shadow-2xl w-full animate__animated animate__fadeInRight">
            <button onclick="location.reload()" class="mb-6 text-blue-600 font-bold">← ফিরে যাই</button>
            <p class="text-slate-500 font-medium mb-6 text-center">ভর্তির সময় পেমেন্ট নম্বরটি দিন</p>
            <input type="number" id="phoneInput" placeholder="01XXXXXXXXX" class="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl mb-6 focus:border-blue-500 focus:bg-white outline-none text-xl tracking-widest text-center">
            <button onclick="fetchMarketingData()" class="w-full bg-slate-900 text-white py-5 rounded-2xl text-lg font-bold active:scale-95 transition-all">তথ্য দেখুন</button>
        </div>
    </div>

    <div id="step3" class="hidden min-h-screen flex flex-col p-6 animate__animated animate__fadeIn">
        <button onclick="location.reload()" class="mt-6 mb-6 text-blue-600 font-bold">← ফিরে যাই</button>
        <h2 class="text-2xl font-bold text-slate-800 mb-8">আপনার নাম সিলেক্ট করুন</h2>
        <div id="teacherList" class="space-y-3 pb-10"></div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <div class="glass sticky top-0 z-50 p-5 flex justify-between items-center border-b border-slate-100">
            <div>
                <p id="roleLabel" class="text-[10px] uppercase font-black text-blue-500 tracking-widest mb-1"></p>
                <h2 id="userName" class="text-lg font-bold text-slate-800"></h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-1">মোট হাদিয়া</p>
                <h2 id="totalHadia" class="text-2xl font-black text-green-600">0</h2>
            </div>
        </div>

        <!-- Main Stats Grid -->
        <div id="statsGrid" class="grid grid-cols-2 gap-4 p-5">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">মোট শিক্ষার্থী</p>
                <h3 id="statStudents" class="text-4xl font-black text-blue-600 leading-none">0</h3>
            </div>
            <!-- Seats Column (Hidden for Marketing) -->
            <div id="seatBox" class="hidden bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">সিট সংখ্যা</p>
                <div class="flex items-baseline gap-1">
                    <h3 id="statSeatsUsed" class="text-4xl font-black text-orange-500 leading-none">0</h3>
                    <span class="text-xl font-bold text-slate-300">/</span>
                    <span id="statSeatsTotal" class="text-xl font-bold text-slate-400">0</span>
                </div>
            </div>
            <div onclick="openLeaderboard()" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 cursor-pointer active:scale-95 transition-all">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">Position</p>
                <div class="flex items-baseline gap-1">
                    <h3 id="statRank" class="text-4xl font-black text-purple-600 leading-none">0</h3>
                    <span id="statTotalUsers" class="text-xs font-bold text-slate-300 italic"></span>
                </div>
            </div>
        </div>

        <!-- Sub Row: Paid/Pending/Free -->
        <div class="px-5 -mt-2 mb-5">
            <div class="glass py-3 px-5 rounded-2xl flex justify-between items-center text-[11px] font-bold uppercase tracking-tight">
                <div class="text-red-500">Pending: <span id="countPending" class="text-slate-800">0</span></div>
                <div class="text-green-600">Paid: <span id="countPaid" class="text-slate-800">0</span></div>
                <div class="text-blue-500">Free: <span id="countFree" class="text-slate-800">0</span></div>
            </div>
        </div>

        <div class="px-5 pb-20">
            <h3 class="font-bold text-slate-800 mb-4">শিক্ষার্থী তালিকা</h3>
            <div id="studentContainer" class="space-y-3"></div>
        </div>
    </div>
</div>

<!-- Details Modal -->
<div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-end sm:items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate__animated animate__slideInUp">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold">বিস্তারিত তথ্য</h3>
            <button onclick="closeModal()" class="w-10 h-10 bg-slate-100 rounded-full">&times;</button>
        </div>
        <div id="modalContent" class="space-y-4 text-slate-600 max-h-[60vh] overflow-y-auto"></div>
    </div>
</div>

<!-- Leaderboard Modal -->
<div id="lbModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[210] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden animate__animated animate__zoomIn">
        <div class="p-8 bg-gradient-to-br from-indigo-600 to-purple-700 text-white flex justify-between items-center">
            <h3 class="text-2xl font-bold">লিডারবোর্ড</h3>
            <button onclick="closeLB()" class="text-2xl">&times;</button>
        </div>
        <div id="lbList" class="p-4 space-y-2 max-h-[60vh] overflow-y-auto bg-slate-50"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznMbcz3Tmk5jfpddZppj2Dc-fEiKSBkrPkFNeP0V6wUWgwZqh55o-MM1ij4vzpmxso/exec"; 
    let currentData = null;

    window.onload = function() {
        if (localStorage.getItem('biom_cache')) showSplash();
        else document.getElementById('step1').classList.remove('hidden');
    };

    function showSplash() {
        const splash = document.getElementById('splash');
        splash.classList.remove('hidden');
        const dhikrs = [{b:"সুবহানাল্লাহ", a:"سُبْحَانَ ٱللَّٰهِ"}, {b:"আলহামদুলিল্লাহ", a:"ٱلْحَمْدُ لِلَّٰهِ"}, {b:"আল্লাহু আকবার", a:"ٱللَّٰهُ أَكْبَرُ"}, {b:"লা ইলাহা ইল্লাল্লাহু", a:"لَا إِلَٰهَ إِلَّا ٱللَّٰهُ"}];
        const r = dhikrs[Math.floor(Math.random() * dhikrs.length)];
        document.getElementById('dhikr-bangla').innerText = r.b;
        document.getElementById('dhikr-arabic').innerText = r.a;
        let count = 10;
        const interval = setInterval(() => {
            count--;
            document.getElementById('timer').innerText = count;
            if (count <= 0) {
                clearInterval(interval);
                splash.classList.add('animate__animated', 'animate__fadeOut');
                setTimeout(() => { splash.classList.add('hidden'); checkCache(); }, 500);
            }
        }, 1000);
    }

    function checkCache() {
        const cache = localStorage.getItem('biom_cache');
        if (cache) { currentData = JSON.parse(cache); renderDashboard(currentData); autoRefresh(); }
        else document.getElementById('step1').classList.remove('hidden');
    }

    function selectRole(role) {
        document.getElementById('step1').classList.add('hidden');
        if (role === 'marketing') document.getElementById('step2').classList.remove('hidden');
        else loadTeacherSelection();
    }

    async function loadTeacherSelection() {
        document.getElementById('step3').classList.remove('hidden');
        setStatusBar("শিক্ষক/শিক্ষিকাদের নাম আনা হচ্ছে...", true, "bg-blue-600");
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getTeacherList`);
            const list = await res.json();
            const container = document.getElementById('teacherList');
            container.innerHTML = "";
            list.forEach(name => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-5 bg-white border border-slate-100 rounded-2xl font-bold shadow-sm active:scale-95 transition-all mb-2";
                b.innerText = name;
                b.onclick = () => fetchTeacherData(name);
                container.appendChild(b);
            });
            setStatusBar("", false);
        } catch (e) { setStatusBar("Error loading", true, "bg-red-600"); }
    }

    async function fetchMarketingData() {
        const phone = document.getElementById('phoneInput').value;
        if (!phone) return;
        setStatusBar("ডেটা আনা হচ্ছে...", true);
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getMarketingData&phone=${phone}`);
            const data = await res.json();
            if (!data.found) { alert("নম্বর পাওয়া যায়নি!"); setStatusBar("", false); return; }
            processAndSave(data, "marketing", phone);
        } catch (e) { setStatusBar("Error!", true, "bg-red-600"); }
    }

    async function fetchTeacherData(name) {
        setStatusBar(`${name} এর ডেটা আনা হচ্ছে...`, true);
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getTeacherData&name=${encodeURIComponent(name)}`);
            const data = await res.json();
            processAndSave(data, "teacher", name);
        } catch (e) { setStatusBar("Error!", true, "bg-red-600"); }
    }

    function processAndSave(data, role, id) {
        data.userRole = role; data.userId = id;
        localStorage.setItem('biom_cache', JSON.stringify(data));
        currentData = data;
        setStatusBar("ডেটা আপডেট সফল!", true, "bg-green-600");
        setTimeout(() => setStatusBar("", false), 2000);
        renderDashboard(data);
    }

    async function autoRefresh() {
        const action = currentData.userRole === 'marketing' ? 'getMarketingData' : 'getTeacherData';
        const param = currentData.userRole === 'marketing' ? 'phone' : 'name';
        try {
            const res = await fetch(`${SCRIPT_URL}?action=${action}&${param}=${encodeURIComponent(currentData.userId)}`);
            const data = await res.json();
            processAndSave(data, currentData.userRole, currentData.userId);
        } catch (e) { }
    }

    function renderDashboard(data) {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');

        document.getElementById('roleLabel').innerText = data.userRole === 'marketing' ? "Marketing Admin" : "Teacher Panel";
        document.getElementById('userName').innerText = data.name;

        // Stats Animation
        animateValue('totalHadia', 0, data.totalHadia, 1500);
        animateValue('statStudents', 0, data.totalStudents, 1500);
        animateValue('statRank', 0, data.rank, 1500);
        document.getElementById('statTotalUsers').innerText = `/ ${data.totalAdmins || data.totalTeachers}`;
        
        // Paid/Pending Count
        animateValue('countPaid', 0, data.paid, 1000);
        animateValue('countPending', 0, data.pending, 1000);
        animateValue('countFree', 0, data.free, 1000);

        // Teacher specific Seats Logic
        const seatBox = document.getElementById('seatBox');
        const statsGrid = document.getElementById('statsGrid');
        if (data.userRole === 'teacher') {
            seatBox.classList.remove('hidden');
            statsGrid.classList.remove('grid-cols-2');
            statsGrid.classList.add('grid-cols-3');
            animateValue('statSeatsUsed', 0, data.totalStudents, 1500);
            document.getElementById('statSeatsTotal').innerText = data.totalSeats;
        } else {
            seatBox.classList.add('hidden');
            statsGrid.classList.remove('grid-cols-3');
            statsGrid.classList.add('grid-cols-2');
        }

        const container = document.getElementById('studentContainer');
        container.innerHTML = "";
        data.students.forEach((s, i) => {
            const isPaid = s.status === 'paid' || s.status === 'free';
            const card = document.createElement('div');
            card.className = "glass p-5 rounded-3xl flex justify-between items-center shadow-sm reveal border-l-4 " + (isPaid ? "border-l-green-500" : "border-l-red-500");
            card.onclick = () => showDetails(s);
            card.innerHTML = `<div><h4 class="font-bold">${s.name}</h4><p class="text-[10px] text-slate-400 uppercase">${s.classTime}</p></div>
                              <span class="text-[10px] font-black uppercase ${isPaid ? 'text-green-600' : 'text-red-500'}">${s.status}</span>`;
            container.appendChild(card);
        });
        initReveal();
    }

    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            obj.innerHTML = Math.floor(progress * (end - start) + start);
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function showDetails(s) {
        const c = document.getElementById('modalContent');
        c.innerHTML = `
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-xs uppercase font-bold text-slate-400">রো নম্বর</p><p class="font-black text-lg">${s.row}</p></div>
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-xs uppercase font-bold text-slate-400">ভর্তির সময়</p><p class="font-bold text-xs">${s.admissionTime}</p></div>
            </div>
            <div class="bg-blue-50 p-4 rounded-2xl"><p class="text-xs font-bold text-blue-400 uppercase">ফেসবুক আইডি</p><a href="${s.fbLink}" target="_blank" class="font-bold text-blue-700 underline">${s.fbName}</a></div>
            ${currentData.userRole === 'teacher' ? `<div class="bg-purple-50 p-4 rounded-2xl"><p class="text-xs font-bold text-purple-400 uppercase">মার্কেটিং মেম্বার</p><p class="font-bold">${s.marketingName} (${s.marketingPhone})</p></div>` : ''}
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-xs font-bold text-slate-400 uppercase">শিক্ষার্থীর মোবাইল নম্বর</p><p class="font-bold">${s.studentPhone}</p></div>
                <div class="bg-slate-50 p-4 rounded-2xl"><p class="text-xs font-bold text-slate-400 uppercase">Teacher</p><p class="font-bold">${s.teacherName}</p></div>
            </div>
            <div class="bg-yellow-50 p-4 rounded-2xl"><p class="text-xs font-bold text-yellow-600 uppercase">মন্তব্য</p><p class="italic text-slate-600">${s.comment || 'নেই'}</p></div>
        `;
        document.getElementById('modal').classList.remove('hidden');
    }

    function openLeaderboard() {
        const list = document.getElementById('lbList');
        list.innerHTML = "";
        currentData.leaderboard.forEach(item => {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl flex justify-between items-center border mb-2 ${item.isMe ? 'bg-purple-600 text-white' : 'bg-white text-slate-700'}`;
            div.innerHTML = `<div class="flex items-center gap-4"><span>${item.rank}</span><p class="font-bold">${item.name}</p></div>
                              <p class="font-black">${item.count}</p>`;
            list.appendChild(div);
        });
        document.getElementById('lbModal').classList.remove('hidden');
    }

    function setStatusBar(text, show, color = "bg-blue-600") {
        const b = document.getElementById('status-bar');
        b.className = `fixed top-0 w-full z-[100] text-white text-[10px] font-bold flex items-center justify-center uppercase tracking-widest ${color}`;
        document.getElementById('status-text').innerText = text;
        show ? b.classList.add('show') : b.classList.remove('show');
    }

    function initReveal() {
        const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); }), { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function closeLB() { document.getElementById('lbModal').classList.add('hidden'); }
</script>

</body>
</html>
