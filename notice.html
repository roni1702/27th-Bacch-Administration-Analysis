<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জরুরি নোটিশ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .notice-container {
            text-align: center;
            background: #fff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            border-top: 8px solid #e74c3c;
        }
        h1 {
            color: #e74c3c;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .apology {
            font-style: italic;
            color: #777;
            margin-top: 25px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="notice-container">
        <h1>জরুরি নোটিশ</h1>
        <p>কিছু সমস্যার কারণে ওয়েবসাইটটি বন্ধ করতে হয়েছে। সমাধান হয়ে গেলে পুনরায় ওয়েবসাইটটি পাবলিশ করা হবে ইনশা আল্লাহ।</p>
        <p class="apology">সাময়িক অসুবিধার জন্য আমি আন্তরিক ভাবে দুঃখিত।</p>
    </div>

</body>
</html>
